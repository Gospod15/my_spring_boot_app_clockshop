<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" th:replace="~{fragments/layout :: layout(${title}, ~{::main})}">
<body>

<main class="container my-5" style="max-width: 700px;">

    <div class="mb-4">
        <a th:href="${type == 'user' ? '/profile' : '/admin'}" class="text-decoration-none text-muted fw-semibold" style="font-size: 1.1rem;">
            <span class="fs-4 align-middle me-2"></span>Назад
        </a>
    </div>

    <div class="bg-white p-4 p-lg-5 rounded-5 shadow-lg border-0">
        <h2 class="fw-bold text-dark mb-4 text-center" th:text="${title}">Заголовок форми</h2>

        <form th:action="${actionUrl}" th:object="${item}" method="post" class="d-flex flex-column gap-4">

            <input type="hidden" th:field="*{id}" />

            <div th:unless="${type == 'user'}">
                <div>
                    <label for="name" class="form-label fw-bold text-dark ps-2">Назва</label>
                    <input type="text" th:field="*{name}" id="name" class="form-control form-control-lg rounded-pill px-4 border-2" placeholder="Введіть назву...">
                </div>

                <div th:if="${type == 'product'}" class="row g-3 mt-1">
                    <div class="col-12 col-sm-6">
                        <label for="price" class="form-label fw-bold text-dark ps-2">Ціна (грн)</label>
                        <input type="number" step="0.01" th:field="*{price}" id="price" class="form-control form-control-lg rounded-pill px-4 border-2" placeholder="0.00">
                    </div>
                    <div class="col-12 col-sm-6">
                        <label for="category" class="form-label fw-bold text-dark ps-2">Категорія товарів</label>
                        <select th:field="*{category.id}" id="category" class="form-select form-select-lg rounded-pill px-4 border-2">
                            <option value="" disabled selected>Оберіть категорію...</option>
                            <option th:each="cat : ${categories}" th:value="${cat.id}" th:text="${cat.name}"></option>
                        </select>
                    </div>
                </div>

                <div class="mt-3">
                    <label for="image" class="form-label fw-bold text-dark ps-2">URL Зображення</label>
                    <input type="text" th:field="*{image}" id="image" class="form-control form-control-lg rounded-pill px-4 border-2" placeholder="https://example.com/photo.jpg">
                </div>

                <div class="mt-3">
                    <label for="description" class="form-label fw-bold text-dark ps-2">Детальний опис</label>
                    <textarea th:field="*{description}" id="description" rows="4" class="form-control rounded-4 p-3 border-2" placeholder="Додайте опис..."></textarea>
                </div>

                <div th:if="${type == 'category'}" class="form-check form-switch mb-4 ms-2 mt-3" style="font-size: 1.25rem;">
                    <input class="form-check-input border-secondary shadow-sm" type="checkbox" role="switch" th:field="*{recomended}" id="recomended" style="cursor: pointer;">
                    <label class="form-check-label fw-bold text-dark ms-2" for="recomended" style="cursor: pointer; font-size: 1.05rem; padding-top: 0.15rem;">
                        Показувати на головній як рекомендовану
                    </label>
                </div>
            </div>

            <div th:if="${type == 'user'}" class="d-flex flex-column gap-3">

                <div>
                    <label class="form-label fw-bold text-dark ps-2">Логін (Username)</label>
                    <input type="text" th:field="*{username}" class="form-control form-control-lg rounded-pill px-4 border-2" required>
                </div>

                <div class="row g-3">
                    <div class="col-12 col-sm-6">
                        <label class="form-label fw-bold text-dark ps-2">Ім'я</label>
                        <input type="text" th:field="*{firstName}" class="form-control form-control-lg rounded-pill px-4 border-2" required>
                    </div>
                    <div class="col-12 col-sm-6">
                        <label class="form-label fw-bold text-dark ps-2">Прізвище</label>
                        <input type="text" th:field="*{lastName}" class="form-control form-control-lg rounded-pill px-4 border-2" required>
                    </div>
                </div>

                <div class="row g-3">
                    <div class="col-12 col-sm-6">
                        <label class="form-label fw-bold text-dark ps-2">Електронна пошта</label>
                        <input type="email" th:field="*{email}" class="form-control form-control-lg rounded-pill px-4 border-2" required>
                    </div>
                    <div class="col-12 col-sm-6">
                        <label class="form-label fw-bold text-dark ps-2">Телефон</label>
                        <input type="text" th:field="*{phone}" class="form-control form-control-lg rounded-pill px-4 border-2">
                    </div>
                </div>

                <div class="p-3 bg-light rounded-4 border mt-2">
                    <label class="form-label fw-bold text-primary ps-2">Роль користувача в системі</label>
                    <select th:field="*{role}" class="form-select form-select-lg rounded-pill px-4 border-primary border-2 fw-bold" required>
                        <option value="ROLE_USER">👤 Користувач (USER)</option>
                        <option value="ROLE_MODERATOR">🛡️ Модератор (MODERATOR)</option>
                        <option value="ROLE_ADMIN">👑 Адміністратор (ADMIN)</option>
                    </select>
                    <small class="text-muted ms-2 mt-1 d-block">Увага: Адміністратор має повний доступ до всіх функцій сайту.</small>
                </div>

            </div>

            <hr class="my-2">

            <div>
                <button type="submit" class="btn btn-dark btn-lg w-100 py-3 fw-bold rounded-pill text-uppercase shadow-sm" style="letter-spacing: 1px;">
                    Зберегти зміни
                </button>
            </div>

        </form>
    </div>

</main>

</body>
</html>
