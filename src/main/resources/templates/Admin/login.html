<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" th:replace="~{fragments/layout :: layout('Вхід в систему', ~{::main})}">
<body>

<main class="container my-5" style="max-width: 450px;">
    <div class="bg-white p-4 p-lg-5 rounded-5 shadow-sm border">
        <h2 class="fw-bold text-dark mb-4 text-center">Авторизація</h2>

        <div th:if="${param.success}" class="alert alert-success rounded-4 text-center" role="alert">
            Ви успішно зареєструвалися! Увійдіть у систему.
        </div>
        <div th:if="${param.error}" class="alert alert-danger rounded-4 text-center" role="alert">
            Неправильний логін або пароль.
        </div>
        <div th:if="${param.logout}" class="alert alert-info rounded-4 text-center" role="alert">
            Ви вийшли з системи.
        </div>

        <form th:action="@{/login}" method="post" class="d-flex flex-column gap-3">
            <div>
                <label class="form-label fw-semibold">Логін</label>
                <input type="text" name="username" class="form-control form-control-lg rounded-pill px-4" required />
            </div>
            <div>
                <label class="form-label fw-semibold">Пароль</label>
                <input type="password" name="password" class="form-control form-control-lg rounded-pill px-4" required />
            </div>
            <button type="submit" class="btn btn-dark btn-lg w-100 rounded-pill fw-bold mt-2">Увійти</button>
        </form>

        <div class="text-center mt-4">
            <p class="mb-0 text-muted">Немає акаунту? <a th:href="@{/register}" class="text-dark fw-bold text-decoration-none">Створити</a></p>
        </div>
    </div>
</main>

</body>
</html>
