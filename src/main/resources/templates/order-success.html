<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" th:replace="~{fragments/layout :: layout(${title}, ~{::main})}">
<body>

<main class="container my-5 text-center flex-grow-1 d-flex flex-column justify-content-center align-items-center" style="min-height: 50vh;">
    <div class="bg-white p-5 rounded-5 shadow-sm border" style="max-width: 600px;">

        <div class="mb-4">
            <svg xmlns="http://www.w3.org/2000/svg" width="80" height="80" fill="#198754" class="bi bi-check-circle-fill" viewBox="0 0 16 16">
                <path d="M16 8A8 8 0 1 1 0 8a8 8 0 0 1 16 0zm-3.97-3.03a.75.75 0 0 0-1.08.022L7.477 9.417 5.384 7.323a.75.75 0 0 0-1.06 1.06L6.97 11.03a.75.75 0 0 0 1.079-.02l3.992-4.99a.75.75 0 0 0-.01-1.05z"/>
            </svg>
        </div>

        <h2 class="fw-bold text-dark mb-3">Дякуємо за замовлення!</h2>
        <p class="text-muted fs-5 mb-4">
            Ваше замовлення успішно оформлено. Ми зв'яжемося з вами найближчим часом для підтвердження деталей відправки.
        </p>

        <a th:href="@{/catalog}" class="btn btn-dark btn-lg rounded-pill px-5 fw-bold text-uppercase" style="letter-spacing: 1px;">
            Продовжити покупки
        </a>
    </div>
</main>

</body>
</html>
