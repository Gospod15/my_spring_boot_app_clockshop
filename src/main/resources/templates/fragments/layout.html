<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" th:fragment="layout (title, content)">
<head th:replace="~{fragments/header :: head}"></head>
<body class="d-flex flex-column min-height-100" style="min-height: 100vh; position: relative;">

<div th:replace="~{fragments/header :: navbar}"></div>

<div th:class="${title == 'Головна сторінка'} ? 'flex-grow-1' : 'container mt-4 flex-grow-1'">
    <div th:replace="${content}"></div>
</div>

<div th:replace="~{fragments/footer :: footer}" class="mt-auto"></div>

<div class="position-fixed" style="bottom: 30px; right: 30px; z-index: 1050;">
    <button type="button" class="btn btn-dark rounded-circle shadow-lg d-flex align-items-center justify-content-center"
            style="width: 70px; height: 70px;" data-bs-toggle="modal" data-bs-target="#cartModal">

        <i class="bi bi-cart3 text-white" style="font-size: 2rem;"></i>

        <span id="cartBadge" class="position-absolute top-0 start-100 translate-middle badge rounded-pill bg-danger"
              style="margin-left: -5px; left: 55px"
              th:styleappend="${cartCount == null or cartCount == 0} ? 'display: none;' : ''"
              th:text="${cartCount != null ? cartCount : 0}"></span>
    </button>
</div>

<div class="modal fade" id="cartModal" tabindex="-1" aria-hidden="true">
    <div class="modal-dialog modal-dialog-centered modal-lg">
        <div class="modal-content text-dark">

            <div class="modal-header bg-light">
                <h5 class="modal-title fw-bold">Ваш кошик</h5>
                <button type="button" class="btn-close" data-bs-dismiss="modal" aria-label="Закрити"></button>
            </div>

            <div class="modal-body p-4" id="cartModalBody">

                <div th:if="${cartCount == null or cartCount == 0}" class="text-center py-5">
                    <i class="bi bi-cart-x text-muted" style="font-size: 3rem;"></i>
                    <h5 class="mt-3 text-muted">Ваш кошик порожній</h5>
                </div>

                <div th:unless="${cartCount == null or cartCount == 0}">
                    <div class="table-responsive">
                        <table class="table align-middle border-bottom">
                            <tbody>
                            <tr th:each="item : ${cartItems}" class="cart-item-row">

                                <td style="width: 80px;">
                                    <img th:src="${item.product.image}" class="img-fluid rounded shadow-sm" alt="Товар">
                                </td>

                                <td>
                                    <a th:href="@{/product(productId=${item.product.id})}" class="text-decoration-none nav-link-custom p-0">
                                        <h6 class="mb-1 fw-bold" th:text="${item.product.name}">Назва</h6>
                                    </a>
                                    <small class="text-muted item-price" th:data-price="${item.product.price}" th:text="${item.product.price} + ' грн'"></small>
                                </td>

                                <td style="width: 180px;">
                                    <form th:action="@{/cart/update}" method="post" class="d-flex align-items-center m-0 gap-2 update-cart-form">
                                        <input type="hidden" name="cartItemId" th:value="${item.id}">
                                        <input type="number" name="quantity" th:value="${item.quantity}" min="1"
                                               class="form-control form-control-sm text-center cart-qty-input"
                                               style="width: 70px;">
                                    </form>
                                </td>

                                <td class="text-end" style="width: 80px;">
                                    <form th:action="@{/cart/remove}" method="post" class="m-0 remove-cart-form">
                                        <input type="hidden" name="cartItemId" th:value="${item.id}">
                                        <button type="submit" class="btn btn-sm btn-outline-danger" title="Видалити" style="padding: 0.4rem 0.8rem !important;">
                                            <i class="bi bi-trash"></i>
                                        </button>
                                    </form>
                                </td>
                            </tr>
                            </tbody>
                        </table>
                    </div>

                    <div class="d-flex flex-wrap justify-content-between align-items-center mt-4 gap-3">
                        <div>
                            <span class="text-muted">Загальна вартість:</span>
                            <h4 id="cartTotalDisplay" class="mb-0 fw-bold" th:text="${cartTotal} + ' грн'">0 грн</h4>
                        </div>

                        <div class="d-flex gap-4">
                            <form th:action="@{/cart/clear}" method="post" class="m-0 clear-cart-form">
                                <button type="submit" class="btn btn-outline-danger px-4">Очистити</button>
                            </form>
                            <a href="/checkout" class="btn btn-dark px-4">Оформити</a>
                        </div>
                    </div>
                </div>

            </div>
        </div>
    </div>
</div>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/js/bootstrap.bundle.min.js"></script>
<script th:src="@{/js/main.js}"></script>
</body>
</html>
